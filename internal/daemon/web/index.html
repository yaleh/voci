<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>voci</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #07090d; overscroll-behavior: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1a2035; border-radius: 2px; }

@keyframes spin      { to { transform: rotate(360deg); } }
@keyframes wave-a    { 0%,100% { height: 4px;  } 50% { height: 20px; } }
@keyframes wave-b    { 0%,100% { height: 7px;  } 50% { height: 27px; } }
@keyframes wave-c    { 0%,100% { height: 5px;  } 50% { height: 16px; } }
@keyframes wave-d    { 0%,100% { height: 9px;  } 50% { height: 25px; } }
@keyframes msg-in    { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

#voci-compose::placeholder { color: #2a3a50; }

#recording-wrap, #processing-wrap,
#action-left-recording, #action-left-processing,
#cancel-recording-btn, #processing-dots,
#cancel-processing-btn { display: none; }

#voci-status {
  display: none;
  margin: 6px 12px 0;
  padding: 6px 10px;
  border-radius: 6px;
  background: #0e1422;
  border: 1px solid #1a2440;
  font-size: 11px;
  color: #4a6080;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.04em;
  text-align: center;
}

#clear-btn {
  display: none;
  height: 34px;
  padding: 0 11px;
  border-radius: 8px;
  background: none;
  border: 1px solid #131c2e;
  color: #4a6080;
  font-size: 14px;
  font-family: 'Space Grotesk', sans-serif;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
#clear-btn:hover { border-color: #2a3a50; color: #7a9aba; }
</style>
</head>
<body>

<div id="voci-root" style="height: 100dvh; display: flex; flex-direction: column; max-width: 420px; margin: 0 auto; position: relative; font-family: 'Space Grotesk', sans-serif; background: #07090d; color: #dde3ef; overflow: hidden;">

  <!-- STATUS BAR -->
  <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #0e1220; flex-shrink: 0;">
    <span style="font-size: 13px; font-weight: 600; letter-spacing: 0.12em; color: #e4eaf5; text-transform: lowercase;">voci</span>
    <div style="display: flex; align-items: center; gap: 9px;">
      <button id="refresh-btn" style="font-size: 10px; color: #4a6080; font-family: 'JetBrains Mono', monospace; background: none; border: none; cursor: pointer; letter-spacing: 0.02em; padding: 0;">just now</button>
      <div id="conn-dot" style="width: 6px; height: 6px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 5px #22c55e;"></div>
    </div>
  </div>

  <!-- CONTEXT STRIP -->
  <div style="display: flex; align-items: center; border-bottom: 1px solid #0e1220; flex-shrink: 0; background: #07090d;">
    <div id="task-pills" style="display: flex; align-items: center; gap: 6px; padding: 6px 15px; flex: 1; overflow: hidden; min-height: 29px;"></div>
    <button id="entities-toggle" style="display: flex; align-items: center; gap: 5px; padding: 6px 14px 6px 10px; border-left: 1px solid #0e1220; color: #4a6080; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; background: none; border-top: none; border-right: none; border-bottom: none; cursor: pointer; flex-shrink: 0; white-space: nowrap;">
      <span id="entities-count">0 entities</span>
      <span id="context-chevron" style="font-size: 8px;">▸</span>
    </button>
  </div>

  <!-- CONTEXT PANEL -->
  <div id="context-panel" style="display: none; border-bottom: 1px solid #0e1220; flex-shrink: 0; background: #0a0c14; overflow: hidden;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; padding: 8px 15px 9px;">
      <div style="border-right: 1px solid #0e1220; padding-right: 12px;">
        <div style="font-size: 9px; color: #3d5068; letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 5px;">Entities</div>
        <div id="entities-list" style="display: flex; flex-direction: column; gap: 2px;"></div>
      </div>
      <div style="padding-left: 12px;">
        <div style="font-size: 9px; color: #3d5068; letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 5px;">Tasks</div>
        <div id="tasks-list" style="display: flex; flex-direction: column; gap: 3px;"></div>
      </div>
    </div>
  </div>

  <!-- DIALOGUE FEED -->
  <div id="voci-dialogue" style="flex: 1; overflow-y: auto; padding: 12px 0 6px;"></div>

  <!-- BOTTOM INPUT AREA -->
  <div style="flex-shrink: 0; border-top: 1px solid #0d1018; background: #060810;">

    <div id="voci-status"></div>

    <div id="text-input-wrap" style="padding: 10px 12px 0 12px;">
      <textarea id="voci-compose" placeholder="或直接输入…" rows="3" style="width: 100%; background: #0b0e1a; border: 1px solid #131c2e; border-radius: 10px; padding: 10px 12px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; color: #e4eaf5; line-height: 1.55; resize: none; outline: none; caret-color: #5b9cf6; box-sizing: border-box; display: block;"></textarea>
    </div>

    <div id="recording-wrap" style="margin: 10px 12px 0; background: #0c0a0a; border: 1px solid #2a1212; border-radius: 10px; padding: 12px 14px; align-items: center; gap: 10px; min-height: 74px;">
      <span id="timer-str" style="font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #ef4444; font-weight: 500; min-width: 32px; animation: blink-dot 2s ease-in-out infinite;">0:00</span>
      <div style="flex: 1; display: flex; align-items: center; gap: 3px; height: 26px;">
        <div style="width: 3px; border-radius: 99px; background: #ef4444; animation: wave-b 0.65s ease-in-out infinite;"></div>
        <div style="width: 3px; border-radius: 99px; background: #ef4444; animation: wave-a 0.58s ease-in-out infinite; animation-delay: 0.07s;"></div>
        <div style="width: 3px; border-radius: 99px; background: #ef4444; animation: wave-d 0.72s ease-in-out infinite; animation-delay: 0.14s;"></div>
        <div style="width: 3px; border-radius: 99px; background: #ef4444; animation: wave-c 0.61s ease-in-out infinite; animation-delay: 0.21s;"></div>
        <div style="width: 3px; border-radius: 99px; background: #ef4444; animation: wave-b 0.68s ease-in-out infinite; animation-delay: 0.05s;"></div>
        <div style="width: 3px; border-radius: 99px; background: #ef4444; animation: wave-a 0.75s ease-in-out infinite; animation-delay: 0.18s;"></div>
        <div style="width: 3px; border-radius: 99px; background: #ef4444; animation: wave-d 0.55s ease-in-out infinite; animation-delay: 0.09s;"></div>
        <div style="width: 3px; border-radius: 99px; background: #ef4444; animation: wave-c 0.65s ease-in-out infinite; animation-delay: 0.03s;"></div>
      </div>
    </div>

    <div id="processing-wrap" style="margin: 10px 12px 0; background: #0b0e1a; border: 1px solid #131c2e; border-radius: 10px; padding: 12px 14px; align-items: center; gap: 10px; min-height: 74px;">
      <div style="width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #131c2e; border-top-color: #5b9cf6; animation: spin 0.75s linear infinite; flex-shrink: 0;"></div>
      <span style="font-size: 11px; color: #4a6080; letter-spacing: 0.06em;">Analyzing…</span>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px 14px;">
      <div id="action-left-idle" style="display: flex; align-items: center; gap: 8px;">
        <button id="mic-btn" style="display: flex; align-items: center; gap: 6px; height: 34px; padding: 0 13px; border-radius: 8px; background: #1a0808; border: 1.5px solid #3a1010; color: #ef4444; font-size: 11.5px; font-family: 'Space Grotesk', sans-serif; cursor: pointer;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="9" y="2" width="6" height="11" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
          Hold to speak
        </button>
        <span style="font-size: 9px; color: #2a3a50; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; white-space: nowrap;">or hold <kbd style="font-family: inherit; background: #0e1422; border: 1px solid #1a2440; border-radius: 3px; padding: 0 4px; font-size: 8.5px; color: #3a5070;">Space</kbd></span>
      </div>
      <div id="action-left-recording">
        <span style="font-size: 11px; color: #3a4a60; letter-spacing: 0.03em;">松开发送</span>
      </div>
      <div id="action-left-processing">
        <span style="font-size: 11px; color: #3a4a60; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;">analyzing…</span>
      </div>

      <div style="display: flex; align-items: center; gap: 6px;">
        <button id="clear-btn">×</button>
        <button id="send-btn" style="height: 34px; padding: 0 16px; border-radius: 8px; background: #090c15; border: 1px solid #0f1522; color: #252f42; font-size: 12px; font-weight: 500; font-family: 'Space Grotesk', sans-serif; cursor: default; display: flex; align-items: center; gap: 6px; transition: background 0.2s, color 0.2s, border-color 0.2s;">
          Send
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
      </div>
      <button id="cancel-recording-btn" style="height: 34px; padding: 0 13px; border-radius: 8px; background: none; border: 1px solid #131c2e; color: #3d5070; font-size: 11.5px; font-family: 'Space Grotesk', sans-serif; cursor: pointer;">✕ cancel</button>
      <span id="processing-dots" style="height: 34px; padding: 0 13px; align-items: center; font-size: 11px; color: #252f42;">···</span>
      <button id="cancel-processing-btn" style="height: 34px; padding: 0 13px; border-radius: 8px; background: none; border: 1px solid #131c2e; color: #3d5070; font-size: 11.5px; font-family: 'Space Grotesk', sans-serif; cursor: pointer; align-items: center; gap: 5px;">✕ cancel</button>
    </div>
  </div>

</div>

<div id="voci-token-setup" style="display:none; position:fixed; inset:0; background:#07090d; z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:12px;">
  <p style="color:#fff; font-size:14px;">Enter your voci Bearer token:</p>
  <div style="display:flex; gap:8px; align-items:center;">
    <input id="voci-token" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" placeholder="000000" style="padding:8px 12px; border-radius:6px; border:none; width:200px; font-size:14px; letter-spacing:0.15em; text-align:center;">
    <button onclick="saveToken()" style="padding:8px 20px; border-radius:6px; background:#5b9cf6; color:#fff; border:none; cursor:pointer; font-size:14px; white-space:nowrap;">Save</button>
  </div>
</div>

<script src="recorder.js"></script>
</body>
</html>
